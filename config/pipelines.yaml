# ── AutoNomX Pipeline Configuration ──────────────────────────
# İteratif geliştirme pipeline'ı tanımları

pipeline:
  name: "default"
  description: "Standart otonom geliştirme pipeline'ı"

  # Pipeline aşamaları
  stages:
    - name: "analysis"
      agent: "product_owner"
      description: "Kullanıcı isteğini analiz et, user story oluştur"
      next: "planning"

    - name: "planning"
      agent: "planner"
      description: "User story'leri teknik task'lara böl"
      next: "architecture"

    - name: "architecture"
      agent: "architect"
      description: "Proje yapısı, task board hazırla, sprint planla"
      next: "development_loop"

    - name: "development_loop"
      description: "İteratif geliştirme döngüsü"
      loop: true
      stages:
        - name: "model_assignment"
          agent: "model_manager"
          description: "Task için en uygun worker + model seç"

        - name: "coding"
          agent: "coder"
          description: "Worker task board'dan iş alır, kodlar"
          parallel: true

        - name: "testing"
          agent: "tester"
          description: "Test yaz ve çalıştır"
          on_failure:
            action: "retry"
            max_retries: 3
            escalate_to: "model_manager"

        - name: "review"
          agent: "reviewer"
          description: "Kod inceleme"
          on_approval: "merge"
          on_revision:
            action: "retry"
            max_retries: 3
            return_to: "coding"

    - name: "delivery"
      description: "Proje teslimi"

  # Pipeline ayarları
  settings:
    max_iterations: 50
    timeout_minutes: 480
    git_workflow:
      branch_pattern: "feature/{task_id}-{short_description}"
      commit_format: "{type}: {description}"
      merge_strategy: "squash"

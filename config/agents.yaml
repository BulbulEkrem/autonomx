# ── AutoNomX Agent Configuration ─────────────────────────────
# Agent tanımları ve varsayılan LLM modelleri
# Tüm agentlar LM Studio üzerinden çalışır (localhost:1234)

agents:
  product_owner:
    type: product_owner
    model: "lm_studio/qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2"
    provider: lm_studio
    description: "İstek analizi, user story oluşturma, kullanıcı chat"
    parameters:
      temperature: 0.7
      max_tokens: 4096

  planner:
    type: planner
    model: "lm_studio/qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2"
    provider: lm_studio
    description: "User story → teknik task dönüşümü"
    parameters:
      temperature: 0.5
      max_tokens: 4096

  architect:
    type: architect
    model: "lm_studio/qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2"
    provider: lm_studio
    description: "Proje yapısı, scaffolding, sprint yönetimi"
    parameters:
      temperature: 0.3
      max_tokens: 8192

  model_manager:
    type: model_manager
    model: "lm_studio/qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2"
    provider: lm_studio
    description: "LLM atama, performans takibi, model optimizasyonu"
    parameters:
      temperature: 0.3
      max_tokens: 2048

  tester:
    type: tester
    model: "lm_studio/qwen/qwen3-coder-next"
    provider: lm_studio
    description: "Test yazma ve çalıştırma"
    parameters:
      temperature: 0.2
      max_tokens: 8192

  reviewer:
    type: reviewer
    model: "lm_studio/qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2"
    provider: lm_studio
    description: "Kod kalitesi, güvenlik, onay"
    parameters:
      temperature: 0.2
      max_tokens: 8192

# ── Coder Worker Pool ────────────────────────────────────────
coder_pool:
  workers:
    - count: 2
      model: "lm_studio/qwen/qwen3-coder-next"
      provider: lm_studio
    - count: 1
      model: "lm_studio/qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2"
      provider: lm_studio

  # Worker davranış ayarları
  settings:
    max_retries: 3
    task_pick_strategy: "smart"  # smart | fifo | priority
    file_lock_mode: "hard"       # hard | soft

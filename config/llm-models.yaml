  - tier: 1
    label: "LM Studio local (primary)"
    models:
      - lm_studio/qwen/qwen3-coder-next
      - lm_studio/qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2
  - tier: 2
    label: "Ollama local (backup)"
    models:
      - ollama/codellama:13b
      - ollama/qwen2.5-coder:14b
  - tier: 3
    label: "Top-level Ollama"
    models:
      - ollama/deepseek-coder-v2:16b
      - ollama/deepseek-r1:14b
      - ollama/qwen2.5-coder:32b
